name: Quality Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies safely
        run: |
          node --version
          npm --version
          rm -f package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000
          npm install --no-audit --no-fund --prefer-online
      - name: Run project checks
        run: |
          npm run typecheck
          npm run check:assets
          npm run check:health
          npm run check:kakao
          npm run check:kakao-portrait
          npm run check:content
          npm run check:workflows
          npm run check:special-rules
          npm run check:lobby-flow
          npm run check:lobby-missions
          npm run check:exit-scroll
          npm run check:v2-assets
          npm run check:real-atlas
          npm run check:touch-qa
          npm run check:boss-sheets
          npm run check:viewport-frame
          npm run check:gameplay-mapping
          npm run check:alpha-clean
          npm run check:lobby-motion
          npm run check:button-states
          npm run check:ranking-ux
          npm run check:atlas-extended
          npm run report:images
      - name: Build GitHub Pages bundle
        run: npm run build:github
