name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies safely
        run: |
          node --version
          npm --version
          rm -f package-lock.json
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000
          npm install --no-audit --no-fund --prefer-online
      - name: Verify project policy
        run: |
          npm run typecheck
          npm run check:assets
          npm run check:health
          npm run check:kakao
          npm run check:kakao-portrait
          npm run check:kakao-lobby-rotation
          npm run check:content
          npm run check:workflows
          npm run check:special-rules
          npm run check:lobby-flow
          npm run check:lobby-missions
          npm run check:exit-scroll
          npm run check:v2-assets
          npm run check:real-atlas
          npm run check:touch-qa
          npm run check:boss-sheets
          npm run check:viewport-frame
          npm run check:gameplay-mapping
          npm run check:alpha-clean
          npm run check:lobby-motion
          npm run check:button-states
          npm run check:ranking-ux
          npm run check:atlas-extended
          npm run check:background-optimization
          npm run check:boss-atlas
          npm run check:mobile-layout
          npm run check:scroll-polish
          npm run check:boss-atlas-rendering
          npm run check:asset-compression
          npm run check:interaction-polish
          npm run check:pixi-boss-layer
          npm run check:inapp-device-qa
          npm run check:ranking-flow
          npm run check:display-copy
          npm run check:tile-readability
          npm run check:board-camera
          npm run check:selection-stability
          npm run check:mobile-playability
          npm run check:no-minimap-topbar
          npm run check:boot-screen
          npm run check:objective-camera-boss
          npm run check:tile-geometry-hud
          npm run check:real-device-selection
          npm run check:space-reclaim-back-options
          npm run check:boss-asset-visibility
          npm run check:boss-pattern-density
          npm run check:board-focus-tempo-cache
          npm run check:mobile-board-reward-flow
          npm run check:auth-entry-flow
          npm run check:account-time-pressure
          npm run check:auth-modal-boss-role
          npm run report:images
      - name: Build GitHub Pages bundle
        run: npm run build:github
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
